<svg viewBox="0 0 900 1150" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
    <linearGradient id="startGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="procGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="decGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="endGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="1150" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Logic Box — Program Flow</text>

  <!-- Start -->
  <rect x="360" y="65" width="180" height="55" rx="27" fill="url(#startGrad)"/>
  <text x="450" y="98" text-anchor="middle" fill="white" font-size="16" font-weight="600">START</text>

  <line x1="450" y1="120" x2="450" y2="150" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Show menu -->
  <rect x="290" y="150" width="320" height="60" rx="10" fill="url(#procGrad)"/>
  <text x="450" y="175" text-anchor="middle" fill="white" font-size="14" font-weight="600">Display Menu</text>
  <text x="450" y="195" text-anchor="middle" fill="#e0f2fe" font-size="12">1) Triangle Pattern  2) Number Analysis  3) Exit</text>

  <line x1="450" y1="210" x2="450" y2="240" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Loop marker -->
  <rect x="330" y="240" width="240" height="55" rx="10" fill="url(#procGrad)"/>
  <text x="450" y="272" text-anchor="middle" fill="white" font-size="14" font-weight="600">while True: get choice</text>

  <line x1="450" y1="295" x2="450" y2="330" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="450,330 560,400 450,470 340,400" fill="url(#decGrad)"/>
  <text x="450" y="396" text-anchor="middle" fill="#3f2d00" font-size="14" font-weight="700">choice</text>
  <text x="450" y="414" text-anchor="middle" fill="#3f2d00" font-size="13">== ?</text>

  <!-- Branch labels -->
  <text x="270" y="400" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">"1"</text>
  <text x="450" y="500" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">"2"</text>
  <text x="640" y="400" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">"3"</text>

  <!-- Branch 1: Triangle -->
  <line x1="340" y1="400" x2="130" y2="400" stroke="#4a5568" stroke-width="2"/>
  <line x1="130" y1="400" x2="130" y2="440" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="20" y="440" width="220" height="70" rx="10" fill="url(#procGrad)"/>
  <text x="130" y="465" text-anchor="middle" fill="white" font-size="13" font-weight="600">Input rows (validate &gt; 0)</text>
  <text x="130" y="485" text-anchor="middle" fill="#e0f2fe" font-size="12">Print right-angled</text>
  <text x="130" y="500" text-anchor="middle" fill="#e0f2fe" font-size="12">triangle pattern of "*"</text>

  <!-- Branch 2: Number analysis -->
  <line x1="450" y1="470" x2="450" y2="530" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="530" width="240" height="95" rx="10" fill="url(#procGrad)"/>
  <text x="450" y="553" text-anchor="middle" fill="white" font-size="13" font-weight="600">Input start &amp; end</text>
  <text x="450" y="571" text-anchor="middle" fill="#e0f2fe" font-size="12">Validate end &gt;= start</text>
  <text x="450" y="589" text-anchor="middle" fill="#e0f2fe" font-size="12">Loop range: classify</text>
  <text x="450" y="605" text-anchor="middle" fill="#e0f2fe" font-size="12">even/odd, accumulate sum</text>

  <line x1="450" y1="625" x2="450" y2="655" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="655" width="240" height="45" rx="10" fill="url(#procGrad)"/>
  <text x="450" y="682" text-anchor="middle" fill="white" font-size="13" font-weight="600">Print total sum</text>

  <!-- Branch 3: Exit -->
  <line x1="560" y1="400" x2="770" y2="400" stroke="#4a5568" stroke-width="2"/>
  <line x1="770" y1="400" x2="770" y2="440" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="670" y="440" width="200" height="60" rx="10" fill="url(#endGrad)"/>
  <text x="770" y="465" text-anchor="middle" fill="white" font-size="13" font-weight="600">Print goodbye</text>
  <text x="770" y="483" text-anchor="middle" fill="white" font-size="13" font-weight="600">break loop</text>

  <line x1="770" y1="500" x2="770" y2="540" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="690" y="540" width="160" height="50" rx="25" fill="url(#endGrad)"/>
  <text x="770" y="571" text-anchor="middle" fill="white" font-size="15" font-weight="700">END</text>

  <!-- Invalid choice branch -->
  <line x1="560" y1="400" x2="600" y2="400" stroke="#4a5568" stroke-width="0" />
  <rect x="330" y="770" width="240" height="55" rx="10" fill="#475569"/>
  <text x="450" y="795" text-anchor="middle" fill="white" font-size="13" font-weight="600">else: "Invalid choice!"</text>
  <text x="450" y="813" text-anchor="middle" fill="#cbd5e1" font-size="12">prompt again</text>

  <!-- Loop back arrows from branch 1, branch 2, invalid -->
  <path d="M 130 510 L 130 950 L 450 950" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 450 700 L 450 950" stroke="#4a5568" stroke-width="2" fill="none"/>
  <path d="M 450 825 L 450 950" stroke="#4a5568" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 450 950 L 450 295" stroke="#4a5568" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <text x="470" y="945" fill="#94a3b8" font-size="12" font-style="italic">loop back to menu</text>

  <!-- Legend -->
  <rect x="30" y="1000" width="18" height="18" fill="url(#startGrad)"/>
  <text x="55" y="1014" fill="#cbd5e1" font-size="13">Start / End</text>

  <rect x="30" y="1030" width="18" height="18" fill="url(#procGrad)"/>
  <text x="55" y="1044" fill="#cbd5e1" font-size="13">Process</text>

  <rect x="220" y="1030" width="18" height="18" fill="url(#decGrad)"/>
  <text x="245" y="1044" fill="#cbd5e1" font-size="13">Decision</text>

  <rect x="380" y="1030" width="18" height="18" fill="#475569"/>
  <text x="405" y="1044" fill="#cbd5e1" font-size="13">Error / Fallback</text>

  <rect x="580" y="1030" width="18" height="18" fill="url(#endGrad)"/>
  <text x="605" y="1044" fill="#cbd5e1" font-size="13">Exit</text>
</svg>
